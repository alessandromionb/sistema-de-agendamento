worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # ─────────────────────────────────────────────────
    # Upstream: container FastAPI (rede interna Docker)
    # ─────────────────────────────────────────────────
    upstream fastapi_backend {
        server fastapi:8080;
    }

    server {
        listen 8080;          # porta interna — mapeada para 80 no host
        server_name localhost;

        # ── Frontend estático ──────────────────────────
        location / {
            root   /usr/share/nginx/html;
            index  index.html;
            try_files $uri $uri/ /index.html;
        }

        # ── Proxy reverso para o FastAPI ───────────────
        location /api/ {
            proxy_pass         http://fastapi_backend/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 90s;
        }
    }

    # ─────────────────────────────────────────────────
    # HTTPS — porta 8443 interna (mapeada para 443 host)
    # (bloco descomentado quando certificado disponível)
    # ─────────────────────────────────────────────────
