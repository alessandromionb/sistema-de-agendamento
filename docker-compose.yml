version: "3.9"

networks:
  netatividade01:
    driver: bridge

volumes:
  postgres_data:
  frontend_static:

services:

  # ──────────────────────────────────────────
  # Banco de dados PostgreSQL
  # ──────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: postgres_agendamentos
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - netatividade01
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────
  # Backend FastAPI
  # ──────────────────────────────────────────
  fastapi:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fastapi_agendamentos
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    networks:
      - netatividade01
    depends_on:
      postgres:
        condition: service_healthy
    # NÃO expõe porta para o hospedeiro — tráfego apenas pela rede interna

  # ──────────────────────────────────────────
  # Servidor NGINX (proxy reverso + frontend)
  # ──────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: nginx_agendamentos
    restart: unless-stopped
    ports:
      - "80:8080"
      - "443:8443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/html:/usr/share/nginx/html:ro
    environment:
      FASTAPI_HOST: fastapi
      FASTAPI_PORT: 8080
    networks:
      - netatividade01
    depends_on:
      - fastapi