networks:
  netatividade01:
    driver: bridge

volumes:
  mysql_data:

services:

  # ──────────────────────────────────────────
  # Banco de dados MySQL
  # ──────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: mysql_agendamentos
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - netatividade01
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────
  # Backend FastAPI
  # ──────────────────────────────────────────
  fastapi:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fastapi_agendamentos
    restart: unless-stopped
    environment:
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
    networks:
      - netatividade01
    depends_on:
      mysql:
        condition: service_healthy
    # NÃO expõe porta para o hospedeiro — tráfego apenas pela rede interna

  # ──────────────────────────────────────────
  # Servidor NGINX (proxy reverso + frontend)
  # ──────────────────────────────────────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nginx_agendamentos
    restart: unless-stopped
    ports:
      - "80:8080"
      - "443:8443"
    networks:
      - netatividade01
    depends_on:
      - fastapi
